name: Daily DIPR Press Release Collection

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - validate-only

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Print exact Chrome binary path so agent.py can find it ──────
      - name: Find Chrome binary path
        run: |
          echo "=== Chrome binary locations ==="
          which google-chrome 2>/dev/null && google-chrome --version || echo "google-chrome not in PATH"
          which chromium 2>/dev/null && chromium --version || echo "chromium not in PATH"
          find /opt/hostedtoolcache -name "chrome" -o -name "chromium" 2>/dev/null | head -10
          find /usr -name "google-chrome*" 2>/dev/null | head -5
          echo ""
          echo "=== ChromeDriver locations ==="
          find /opt/hostedtoolcache -name "chromedriver" 2>/dev/null | head -5
          which chromedriver 2>/dev/null || echo "chromedriver not in PATH"

      - name: Run DIPR agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN:     ${{ secrets.HF_TOKEN }}
          HF_REPO_ID:   ${{ secrets.HF_REPO_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "validate-only" ]; then
            python agent.py --validate-only
          else
            python agent.py
          fi

      - name: Commit manifest and reports
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/manifest.json reports/ agent.log || true
          git diff --staged --quiet || git commit -m "chore: update $(date -u '+%Y-%m-%d')"
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            agent.log
            reports/audit_*.txt
          retention-days: 30
          if-no-files-found: warn