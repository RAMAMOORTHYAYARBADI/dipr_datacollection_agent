name: Daily DIPR Press Release Collection

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - validate-only

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── NO browser-actions/setup-chrome — runner already has Chrome ──
      # browser-actions/setup-chrome was CAUSING the problem:
      # it installs a new Chrome binary but leaves the OLD chromedriver
      # → version mismatch → renderer timeout

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Chrome + ChromeDriver match
        run: |
          echo "Chrome version:"
          google-chrome --version
          echo ""
          echo "ChromeDriver version:"
          chromedriver --version || echo "chromedriver not in PATH — webdriver-manager will handle"
          echo ""
          python -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          opts = Options()
          opts.add_argument('--headless=new')
          opts.add_argument('--no-sandbox')
          opts.add_argument('--disable-dev-shm-usage')
          opts.add_argument('--disable-gpu')

          print('Installing matching chromedriver...')
          svc    = Service(ChromeDriverManager().install())
          driver = webdriver.Chrome(service=svc, options=opts)
          driver.get('https://example.com')
          print(f'Chrome OK — title: {driver.title}')
          driver.quit()
          print('Chrome verified successfully')
          "

      - name: Run DIPR agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN:     ${{ secrets.HF_TOKEN }}
          HF_REPO_ID:   ${{ secrets.HF_REPO_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "Mode: $MODE"
          if [ "$MODE" = "validate-only" ]; then
            python agent.py --validate-only
          else
            python agent.py
          fi

      - name: Commit manifest and reports
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/manifest.json reports/ agent.log || true
          git diff --staged --quiet || git commit -m "chore: update $(date -u '+%Y-%m-%d')"
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            agent.log
            reports/audit_*.txt
          retention-days: 30
          if-no-files-found: warn